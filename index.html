<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question - To Ogochukwu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Custom styles to match the precise design of the image */
        :root {
            --bg-blue: #E0F2FE;
            --primary-blue: #0EA5E9;
            --primary-hover: #0284C7;
            --text-dark: #0F172A;
            --shadow-custom: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }
        body {
            background-color: var(--bg-blue);
        }
        .timeline-container {
            background-color: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow-custom);
            width: 100%;
            max-width: 60rem; /* Wide enough to show all items on desktop */
            margin-bottom: 2rem;
        }
        .reveal-button {
            background-color: var(--primary-blue);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            box-shadow: var(--shadow-custom);
        }
        .reveal-button:hover {
            background-color: var(--primary-hover);
        }
        .question-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow-custom);
            text-align: center;
            max-width: 40rem;
            width: 100%;
            margin: 0 auto;
        }
        .action-button {
            padding: 1rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 1.125rem;
            transition: all 0.2s ease;
            width: 12rem;
            text-align: center;
        }
        .yes-button {
            background-color: var(--primary-blue);
            color: white;
            box-shadow: var(--shadow-custom);
        }
        .no-button {
            background-color: #EF4444;
            color: #FFF; /* slate-400 */
            border: 1px solid #E2E8F0; /* slate-200 */
            width: 8rem;
            cursor: default;

        }
        .shake-animation {
            animation: shake 0.5s;
            animation-iteration-count: infinite;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        /* Style for the timeline graphic elements */
        .timeline-line {
            height: 4px;
            background-color: #CBD5E1; /* slate-300 */
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            z-index: 0;
        }
        .timeline-node {
            position: relative;
            z-index: 10;
        }
        .node-icon {
            width: 2rem;
            height: 2rem;
            background-color: white;
            border: 4px solid #CBD5E1; /* slate-300 */
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748B; /* slate-500 */
        }
        .current-node-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-color: #0F172A; /* slate-950 */
            background-color: white;
            color: #0F172A;
            border-width: 6px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-sans">

<h1 class="text-xl font-bold text-slate-950 mb-1">OUR TIMELINE AND THE FUTURE</h1>

<div class="timeline-container relative overflow-x-auto">
    <h2 class="text-xl font-semibold text-slate-950 mb-1">Commit History</h2>
    <div class="flex items-center space-x-12 relative pt-6 px-4">
        <div class="timeline-line"></div>



        <div class="timeline-node text-center flex-shrink-0">

            <img src="img/coffee-cup.jpg" alt="First Coffee Date" class="w-16 h-16 rounded-full mx-auto mb-2 border-2 border-white shadow-md">

            <div class="node-icon mx-auto"><svg class="w-4 h-4 fill-current" viewBox="0 0 16 16"><path d="M12 4.414l-1.414-1.414L8 5.586 5.414 3 4 4.414 6.586 7 4 9.586 5.414 11 8 8.414l2.586 2.586L12 9.586 9.414 7z"></path></svg></div>
            <p class="text-xs font-bold text-slate-700 mt-1">First Coffee Date</p>
            <p class="text-xs text-slate-500">(Commit 0)</p>
        </div>

        <div class="timeline-node text-center flex-shrink-0">
            <img src="img/travel.jpg" alt="First Trip" class="w-16 h-16 rounded-full mx-auto mb-2 border-2 border-white shadow-md">
            <div class="node-icon mx-auto"><svg class="w-4 h-4 fill-current" viewBox="0 0 16 16"><path d="M12 4.414l-1.414-1.414L8 5.586 5.414 3 4 4.414 6.586 7 4 9.586 5.414 11 8 8.414l2.586 2.586L12 9.586 9.414 7z"></path></svg></div>
            <p class="text-xs font-bold text-slate-700 mt-1">First Trip</p>
            <p class="text-xs text-slate-500">(v1.0)</p>
        </div>

        <div class="timeline-node text-center flex-shrink-0">
            <img src="img/family.jpg" alt="Met the Family" class="w-16 h-16 rounded-full mx-auto mb-2 border-2 border-white shadow-md">
            <div class="node-icon mx-auto"><svg class="w-4 h-4 fill-current" viewBox="0 0 16 16"><path d="M12 4.414l-1.414-1.414L8 5.586 5.414 3 4 4.414 6.586 7 4 9.586 5.414 11 8 8.414l2.586 2.586L12 9.586 9.414 7z"></path></svg></div>
            <p class="text-xs font-bold text-slate-700 mt-1">Meet the Family</p>
            <p class="text-xs text-slate-500">(v1.2)</p>
        </div>

        <div class="timeline-node text-center flex-shrink-0">
            <img src="img/bmw.jpg" alt="We Got A Dog" class="w-16 h-16 rounded-full mx-auto mb-2 border-2 border-white shadow-md">
            <div class="node-icon mx-auto"><svg class="w-4 h-4 fill-current" viewBox="0 0 16 16"><path d="M12 4.414l-1.414-1.414L8 5.586 5.414 3 4 4.414 6.586 7 4 9.586 5.414 11 8 8.414l2.586 2.586L12 9.586 9.414 7z"></path></svg></div>
            <p class="text-xs font-bold text-slate-700 mt-1">We Got A Car Together</p>
            <p class="text-xs text-slate-500">(v1.3)</p>
        </div>

        <div class="timeline-node text-center flex-shrink-0 pr-4">
            <div class="current-node-icon mx-auto mt-[4.5rem]"><svg class="w-6 h-6 fill-current" viewBox="0 0 16 16"><path d="M12 4.414l-1.414-1.414L8 5.586 5.414 3 4 4.414 6.586 7 4 9.586 5.414 11 8 8.414l2.586 2.586L12 9.586 9.414 7z"></path></svg></div>
            <p class="text-xs font-bold text-slate-950 mt-1">Our Next Big Step?</p>
            <p class="text-xs text-slate-700">(Current)</p>
        </div>
    </div>
</div>

<button id="revealBtn" class="reveal-button text-lg mb-8">
    Unlock our mystery level
</button>



<div id="questionArea" class="hidden question-card">
    <h2 class="text-3xl font-bold text-slate-950 mb-10 leading-tight">
        Would you like to be my girlfriend Ogochukwu ehh fine girl?
    </h2>
    <div class="flex justify-center items-center space-x-12 relative">
        <button id="yesBtn" class="action-button yes-button">
            YES
        </button>
        <button id="noBtn" class="action-button no-button shake-animation absolute">
            NO
        </button>
    </div>
</div>

<script>
    const revealBtn = document.getElementById('revealBtn');
    const questionArea = document.getElementById('questionArea');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');

    // Reveal the question
    revealBtn.addEventListener('click', () => {
        revealBtn.classList.add('hidden');
    questionArea.classList.remove('hidden');
    });

    // Yes Button effect
    yesBtn.addEventListener('click', () => {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    alert("Yay! You just made me the happiest person Ogochukwu!");
    });

    // Run away No button - improved logic for boundary containment
    noBtn.addEventListener('mouseover', () => {
        const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    // Generate random coordinates
    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    // Apply new position using fixed placement
    noBtn.style.position = 'fixed';
    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
    });
</script>
</body>
</html>
